services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    pull_policy: never
    container_name: ${BACKEND_CONTAINER_NAME:-likesub-backend-ci}
    ports:
      - "8080:${BACKEND_CONTAINER_PORT:-8080}"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-CI}
      ASPNETCORE_HTTP_PORTS: "${BACKEND_CONTAINER_PORT:-8080}"
      Http__EnforceHttps: "${HTTP_ENFORCE_HTTPS:-false}"
      Database__Provider: ${DATABASE_PROVIDER:-mysql}
      Database__ConnectionString: ${DATABASE_CONNECTION_STRING:-server=127.0.0.1;port=3306;database=likesub_ci;user=likesub;password=likesub_pass;}
      Database__ServerVersion: ${DATABASE_SERVER_VERSION:-8.0.0}
      Database__EnableSensitiveDataLogging: "${DATABASE_ENABLE_SENSITIVE_DATA_LOGGING:-false}"
      Database__MaxRetryCount: "${DATABASE_MAX_RETRY_COUNT:-1}"
      Database__MaxRetryDelaySeconds: "${DATABASE_MAX_RETRY_DELAY_SECONDS:-1}"
      Redis__Enabled: "${REDIS_ENABLED:-false}"
      Redis__Host: ${REDIS_HOST:-127.0.0.1}
      Redis__Port: "${REDIS_PORT:-6379}"
      Redis__Password: "${REDIS_PASSWORD:-}"
      Redis__Database: "${REDIS_DATABASE:-0}"
      Redis__InstancePrefix: ${REDIS_INSTANCE_PREFIX:-likesub:ci}
      Redis__DefaultTtlSeconds: "${REDIS_DEFAULT_TTL_SECONDS:-60}"
      Redis__ConnectTimeoutMs: "${REDIS_CONNECT_TIMEOUT_MS:-1000}"
      Redis__SyncTimeoutMs: "${REDIS_SYNC_TIMEOUT_MS:-1000}"
      Redis__ConnectRetry: "${REDIS_CONNECT_RETRY:-0}"
      Redis__AbortOnConnectFail: "${REDIS_ABORT_ON_CONNECT_FAIL:-true}"
      Redis__AllowAdmin: "${REDIS_ALLOW_ADMIN:-false}"
      Redis__Ssl: "${REDIS_SSL:-false}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${BACKEND_CONTAINER_PORT:-8080}/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - likesub-network

networks:
  likesub-network:
    driver: bridge
