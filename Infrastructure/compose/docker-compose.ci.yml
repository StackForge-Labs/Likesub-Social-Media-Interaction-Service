services:
  backend:
    image: likesub-backend-ci:local
    build:
      context: ../..
      dockerfile: Infrastructure/docker/backend.ci.Dockerfile
    pull_policy: never
    container_name: likesub-backend-ci
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: CI
      ASPNETCORE_HTTP_PORTS: "8080"
      Http__EnforceHttps: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
