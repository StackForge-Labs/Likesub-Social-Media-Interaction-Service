services:
  backend:
    image: ${BACKEND_IMAGE:?Use immutable tag or digest in BACKEND_IMAGE}
    container_name: ${BACKEND_CONTAINER_NAME:-likesub-backend}
    ports:
      - "${BACKEND_HOST_PORT:-8080}:${BACKEND_CONTAINER_PORT:-8080}"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: "${BACKEND_CONTAINER_PORT:-8080}"
      Http__EnforceHttps: "${HTTP_ENFORCE_HTTPS:-true}"
      Cors__Enabled: "${CORS_ENABLED:-false}"
      Cors__PolicyName: "${CORS_POLICY_NAME:-AppCors}"
      Cors__AllowedOrigins__0: "${CORS_ALLOWED_ORIGIN_0:-}"
      Cors__AllowedOrigins__1: "${CORS_ALLOWED_ORIGIN_1:-}"
      Cors__AllowCredentials: "${CORS_ALLOW_CREDENTIALS:-true}"
      Cors__PreflightMaxAgeSeconds: "${CORS_PREFLIGHT_MAX_AGE_SECONDS:-600}"
      Database__ConnectionString: ${DATABASE_CONNECTION_STRING:?DATABASE_CONNECTION_STRING is required}
      Database__ServerVersion: ${DATABASE_SERVER_VERSION:-8.0.0}
      Redis__Enabled: "${REDIS_ENABLED:-true}"
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING:-redis:6379,abortConnect=false}
      Redis__InstancePrefix: ${REDIS_INSTANCE_PREFIX:-likesub:prod}
      Redis__DefaultTtlSeconds: "${REDIS_DEFAULT_TTL_SECONDS:-300}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${BACKEND_CONTAINER_PORT:-8080}/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - likesub-network
    restart: unless-stopped

  mysql-db:
    image: ${MYSQL_IMAGE:-mysql:8.0.36}
    profiles: ["selfhosted-data"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required when using selfhosted-data}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-likesub}
      MYSQL_USER: ${MYSQL_USER:-likesub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-likesub_pass}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required when using selfhosted-data}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - likesub-network
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7.2.5-alpine}
    profiles: ["selfhosted-data"]
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required when using selfhosted-data}
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required when using selfhosted-data} ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - likesub-network
    restart: unless-stopped

networks:
  likesub-network:
    driver: bridge

volumes:
  mysql_data_prod:
  redis_data_prod:
