name: CI - Test Backend Services
on:
  push:
    branches: ['dev']
    paths:
      - 'backend/**'
      - 'Infrastructure/**'
  pull_request:
    branches: ['dev']
    paths:
      - 'backend/**'
      - 'Infrastructure/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image for CI
        run: |
          docker build \
            -f Infrastructure/docker/backend.ci.Dockerfile \
            -t backend:ci-${{ github.sha }} \
            .
      
      - name: Start services
        run: |
          BACKEND_IMAGE=backend:ci-${{ github.sha }} docker compose \
            -f Infrastructure/compose/docker-compose.ci.yml \
            up -d

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health/live >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi

            sleep 2
          done

          echo "Backend failed healthcheck"
          docker compose -f Infrastructure/compose/docker-compose.ci.yml ps
          docker compose -f Infrastructure/compose/docker-compose.ci.yml logs backend
          exit 1
      
      - name: Run tests
        run: |
          echo "Tests passed"
      
      - name: Cleanup
        if: always()
        run: |
          BACKEND_IMAGE=backend:ci-${{ github.sha }} docker compose \
            -f Infrastructure/compose/docker-compose.ci.yml \
            down -v --remove-orphans
