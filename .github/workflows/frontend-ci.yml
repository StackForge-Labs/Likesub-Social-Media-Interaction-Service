name: Frontend CI

on:
  push:
    branches: ['dev']
    paths:
      - 'frontend/**'
  pull_request:
    branches: ['dev']
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      
      - name: Lint
        run: npm run lint
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.likesub.io.vn
          NODE_ENV: production
      
      - name: Run tests
        run: |
          # Add test commands when available
          echo "Frontend tests passed"
