name: Code Quality Gate

on:
  push:
    branches-ignore:
      - dev
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            workflows:
              - '.github/workflows/**'

  backend-format:
    name: Backend - Format Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/backend.sln

      - name: Verify code formatting
        run: dotnet format backend/backend.sln --verify-no-changes

  workflow-sanity:
    name: Workflows - Sanity Check
    needs: detect-changes
    if: needs.detect-changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure expected CI workflow files exist
        run: |
          test -f .github/workflows/frontend-ci.yml
          test -f .github/workflows/backend-ci.yml
          test -f .github/workflows/build-push-backend-image.yml

      - name: Ensure legacy duplicate workflow files are removed
        run: |
          test ! -f .github/workflows/ci-test.yml
          test ! -f .github/workflows/build-dev-base.yml
