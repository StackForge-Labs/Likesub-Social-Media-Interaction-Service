name: Build Backend Dev Images
on:
  push:
    branches: ['dev']
    paths:
      # Backend dependency triggers
      - 'backend/*.csproj'
      - 'Infrastructure/docker/backend.dev.Dockerfile'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/backend.csproj'
              - 'Infrastructure/docker/backend.dev.Dockerfile'
  
  build-backend-dev:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and deploy the backend development to the repository.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Infrastructure/docker/backend.dev.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/likesub-backend:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  

  notify:
    needs: [build-backend-dev]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify team
        run: |
          echo "🎉 Dev-base images updated!"
          echo "Immutable tag: ${{ secrets.DOCKER_USERNAME }}/likesub-backend:dev-${{ github.sha }}"
