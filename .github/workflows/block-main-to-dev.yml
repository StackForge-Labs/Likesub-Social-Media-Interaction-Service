name: Block main to dev PR

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  block-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check role for main to dev PR
        uses: actions/github-script@v7
        with:
          script: |
            const headRef = context.payload.pull_request?.head?.ref;
            if (headRef !== "main") {
              core.info("Not a main -> dev PR, skipping policy check.");
              return;
            }

            const username = context.actor;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username
            });

            const permission = data.permission;
            if (permission !== "admin") {
              core.setFailed(`Only users with admin role can open main -> dev PR. Actor=${username}, role=${permission}`);
              return;
            }

            core.info(`Role check passed for ${username} (${permission}).`);
